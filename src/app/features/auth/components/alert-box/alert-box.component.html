<div
  class="fixed top-5 right-5 z-50 max-w-sm rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700 shadow-lg transition-all duration-300 ease-out"
  [class.translate-x-0]="isVisible()"
  [class.opacity-100]="isVisible()"
  [class.translate-x-full]="!isVisible()"
  [class.opacity-0]="!isVisible()"
  role="alert"
  aria-live="assertive"
>
  <div class="flex items-start gap-3">
    <span class="mt-0.5 inline-flex h-5 w-5 items-center justify-center rounded-full bg-red-100 text-xs font-bold text-red-700">!</span>
    <p class="leading-relaxed">{{ message() }}</p>
  </div>
</div>
