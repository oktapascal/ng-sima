<div class="h-full bg-stone-100 grid grid-cols-[240px_1fr]">
  <aside class="bg-stone-950 text-white p-6 flex flex-col border-r border-white/10">
    <h1 class="font-display text-xl font-semibold mb-1">Telkom Property</h1>
    <p class="text-xs text-white/50 mb-8">Private Workspace</p>

    <nav class="space-y-2">
      <a routerLink="/dashboard-home" class="block rounded-lg px-3 py-2 text-sm bg-white/5 hover:bg-white/10 transition-colors">
        Dashboard
      </a>
    </nav>

    <div class="mt-auto">
      <p class="text-xs text-white/60 mb-3">Login sebagai {{ displayName() }}</p>
      <button
        type="button"
        (click)="onLogout()"
        class="w-full rounded-lg border border-white/20 px-3 py-2 text-sm hover:bg-white/10 transition-colors cursor-pointer"
      >
        Logout
      </button>
    </div>
  </aside>

  <main class="overflow-auto p-8">
    <router-outlet></router-outlet>
  </main>
</div>
